<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tncglf Support Center</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Tncglf Motorized Blinds and Shades Technical Support Center">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* 这里的样式可以让侧边栏的品牌名加粗显示 */
    .sidebar-nav strong {
      color: #333;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'Tncglf Support',  // 侧边栏显示的品牌名称
      repo: '',                // 如果想在右上角显示 GitHub 挂件，可以填入仓库地址
      loadSidebar: true,       // 必须开启，用于显示 _sidebar.md 中的自定义菜单
      subMaxLevel: 3,          // 侧边栏自动提取 Markdown 的标题层级
      auto2top: true,          // 切换页面后自动回到顶部
      // 关键：强制让所有路径都去找根目录下的 _sidebar.md
  alias: {
    '/.*/_sidebar.md': '/_sidebar.md'
  },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search help...',
        noData: 'No results found!',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
